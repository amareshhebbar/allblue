# Place in: $SPLUNK_HOME/etc/apps/search/local/savedsearches.conf
# Or create via Splunk UI: Settings → Searches, Reports, and Alerts

[AllBlue - High Severity Alert]
search = index=main sourcetype="Allblue:ioc" severity=CRITICAL
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert.track = 1
alert.severity = 5
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
cron_schedule = */5 * * * *
enableSched = 1
alert.actions = email
action.email.to = your@email.com
action.email.subject = [AllBlue] CRITICAL IOC Detected
action.email.message.alert = AllBlue detected a critical IOC. Check the dashboard for details.

[AllBlue - Daily Triage Summary]
search = index=main sourcetype="allblue:summary" | stats sum(total_findings) as total, sum(critical_count) as critical by date_mday
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1